services:
  auth-service:
    build:
      context: .
      dockerfile: backend/services/AuthenticationService/dockerfile
      args:
        DOCKER_DATABASE_URL: postgresql://adminUser:password@db:5432/auth_db
    env_file:
      - .env
    environment:
      DOCKER_DATABASE_URL: postgresql://adminUser:password@db:5432/auth_db
    ports:
      - "3001:3001"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: platform_db
    environment:
      POSTGRES_USER: adminUser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: