version : '3.8'
services:
  db:
    image: postgres:15
    container_name: coding_platform_db
    restart: always
    volumes:
    - postgres_data:/var/lib/postgresql/data
    ports:
    - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

volumes:
  postgres_data: